<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Assenze e Recuperi Tennis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root{
  --pink:#f48fb1;   --pink-bg:#fce4ec;
  --orange:#e67e00; --orange-bg:#fff3e0;
  --cyan:#29b6d4;   --cyan-bg:#e0f7fa;
  --green:#4caf50;  --green-bg:#e8f5e9;
  --gray:#90a4ae;   --gray-bg:#eceff1;
  --yellow:#fdd835; --yellow-bg:#fffde7;
  --hdr:#1a1d27;    --accent:#f1c40f;
  --border:#ddd;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  background:#e8e8e8;
  min-height:100vh;
}

/* ── TOP BAR ── */
.topbar{
  background:var(--hdr);
  border-bottom:3px solid var(--accent);
  padding:9px 12px;
  display:flex;align-items:center;gap:8px;
}
.topbar h1{color:var(--accent);font-size:1rem;font-weight:800;flex:1;}
.wbadge{background:#2a2d3a;border:1px solid #444;border-radius:12px;
  padding:2px 9px;font-size:.7rem;color:#aaa;white-space:nowrap;}
.fab{background:var(--accent);color:#000;border:none;
  border-radius:18px;padding:6px 13px;
  font-size:.78rem;font-weight:800;cursor:pointer;white-space:nowrap;}
.fab:active{opacity:.75;}

/* ── SCROLL WRAPPER ── */
.scroll{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding:0 6px 100px;
}

/* ── TABLE ── */
table{
  border-collapse:collapse;
  min-width:680px;
  width:100%;
  table-layout:fixed;
}

/* col widths */
col.time-col{width:38px;}
col.day-col{width:1fr;}

/* ── HEADER ROW (giorni) ── */
thead th{
  background:var(--hdr);
  color:var(--accent);
  font-size:.82rem;
  font-weight:800;
  letter-spacing:.05em;
  padding:7px 4px;
  text-align:center;
  position:sticky;top:0;
  z-index:200;
  border:1px solid #333;
}
thead th.time-th{
  font-size:.7rem;color:#888;background:#222;
}

/* ── TIME LABEL CELL ── */
td.time-cell{
  background:#2a2d3a;
  color:var(--accent);
  font-size:.72rem;
  font-weight:800;
  text-align:center;
  vertical-align:top;
  padding:4px 2px;
  border:1px solid #444;
  white-space:nowrap;
  width:38px;
}

/* ── SLOT CELL ── */
td.slot-cell{
  vertical-align:top;
  padding:0;
  border:1px solid var(--border);
}

/* empty cell */
td.empty-cell{
  background:#f5f5f5;
  border:1px solid var(--border);
}

/* ── SLOT INNER ── */
.slot-inner{height:100%;}

/* ── EDIT MODE button in slot header ── */
.slot-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:3px 6px;
  font-size:.68rem;font-weight:800;letter-spacing:.03em;color:#111;
}
.slot-hdr .lbl{font-size:.6rem;opacity:.75;font-weight:600;flex:1;}
.edit-btn{
  background:transparent;border:none;cursor:pointer;
  font-size:.75rem;opacity:.5;padding:0 2px;line-height:1;
  color:#111;
}
.edit-btn:active{opacity:1;}

/* ── ADD STUDENT row ── */
.add-row{
  display:flex;align-items:center;gap:4px;
  padding:4px 4px;
  background:rgba(0,0,0,.04);
}
.add-input{
  flex:1;font-size:.67rem;padding:3px 5px;
  border:1px solid #ccc;border-radius:4px;
  background:#fff;outline:none;
  font-family:inherit;
}
.add-confirm{
  width:20px;height:20px;border-radius:50%;border:none;
  background:#2e7d32;color:#fff;cursor:pointer;
  font-size:.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* ── DELETE button on student row (edit mode) ── */
.del-btn{
  width:18px;height:18px;border-radius:50%;border:none;
  background:#e53935;color:#fff;cursor:pointer;
  font-size:.65rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* ── ADD GROUP button (on empty cells) ── */
.add-grp-btn{
  width:100%;height:100%;min-height:40px;
  background:transparent;border:none;
  color:#bbb;font-size:1.4rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s, color .15s;
}
.add-grp-btn:hover{background:rgba(0,0,0,.06);color:#888;}

/* ── ADD GROUP MODAL ── */
.ag-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);z-index:500;
  justify-content:center;align-items:center;
}
.ag-overlay.open{display:flex;}
.ag-modal{
  background:#fff;border-radius:14px;
  padding:22px 20px;width:280px;
  box-shadow:0 8px 32px rgba(0,0,0,.25);
}
.ag-modal h3{font-size:.95rem;font-weight:800;color:#222;margin-bottom:14px;}
.ag-modal label{font-size:.78rem;font-weight:700;color:#555;display:block;margin-bottom:4px;}
.ag-modal select, .ag-modal input[type=text]{
  width:100%;padding:7px 9px;margin-bottom:12px;
  border:1px solid #ccc;border-radius:7px;
  font-size:.82rem;font-family:inherit;outline:none;
}
.ag-modal select:focus, .ag-modal input:focus{border-color:#888;}
.ag-btns{display:flex;gap:8px;margin-top:4px;}
.ag-btn{
  flex:1;padding:9px;border:none;border-radius:8px;
  font-size:.82rem;font-weight:700;cursor:pointer;
}
.ag-btn.confirm{background:#2e7d32;color:#fff;}
.ag-btn.cancel{background:#eee;color:#555;}
.ag-btn:active{opacity:.75;}
.notes-section{
  padding:12px 10px 30px;
  max-width:100%;
}
.notes-section h2{
  font-size:.85rem;font-weight:800;color:#444;
  letter-spacing:.06em;margin-bottom:8px;
}
.notes-area{
  width:100%;min-height:120px;
  padding:10px;
  font-family:inherit;font-size:.85rem;
  border:1px solid #ccc;border-radius:8px;
  background:#fff;resize:vertical;
  outline:none;color:#222;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.notes-area:focus{border-color:#999;}

/* colours */
.s-pink   .slot-hdr{background:var(--pink);}        .s-pink   .slist{background:var(--pink-bg);}
.s-orange .slot-hdr{background:var(--orange);color:#fff;}
.s-orange .slot-hdr .lbl{color:rgba(255,255,255,.8);}
.s-orange .slist{background:var(--orange-bg);}
.s-cyan   .slot-hdr{background:var(--cyan);}         .s-cyan   .slist{background:var(--cyan-bg);}
.s-green  .slot-hdr{background:var(--green);}        .s-green  .slist{background:var(--green-bg);}
.s-gray   .slot-hdr{background:var(--gray);}         .s-gray   .slist{background:var(--gray-bg);}
.s-yellow .slot-hdr{background:var(--yellow);}       .s-yellow .slist{background:var(--yellow-bg);}

/* ── STUDENT ROW ── */
.srow{
  display:flex;align-items:center;
  padding:4px 4px;
  border-bottom:1px solid rgba(0,0,0,.06);
  color:#111;gap:3px;
  min-height:28px;
}
.srow:last-child{border-bottom:none;}
.srow.absent{background:rgba(198,40,40,.1);}
.srow.absent .sname{color:#b71c1c;text-decoration:line-through;}

.sname{
  flex:1;font-size:.67rem;font-weight:600;
  line-height:1.2;
  /* allow wrapping on small screens */
  word-break:break-word;
}

/* absent btn */
.abtn{
  width:18px;height:18px;border-radius:50%;
  border:1px solid rgba(0,0,0,.2);background:transparent;
  color:rgba(0,0,0,.3);cursor:pointer;font-size:.55rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.srow.absent .abtn{background:#b71c1c;color:#fff;border-color:#b71c1c;}

/* rec controls */
.rctl{display:flex;align-items:center;gap:1px;flex-shrink:0;}
.rbtn{
  width:16px;height:16px;border-radius:50%;border:none;
  cursor:pointer;font-size:.7rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;
}
.rbtn:active{opacity:.6;}
.rbtn.m{background:#e53935;color:#fff;}
.rbtn.p{background:#2e7d32;color:#fff;}
.rcnt{
  min-width:14px;text-align:center;
  font-size:.7rem;font-weight:800;
}
.rcnt.z{color:#aaa;font-size:.65rem;}
.rcnt.pos{color:#bf360c;}
.rcnt.neg{color:#1565c0;}

/* ── STORICO ── */
.st-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;
  justify-content:center;align-items:flex-end;}
.st-overlay.open{display:flex;}
.st-modal{background:#1a1d27;border-radius:18px 18px 0 0;
  width:100%;max-width:720px;max-height:90vh;
  display:flex;flex-direction:column;color:#e8eaf0;}
.st-head{padding:14px 16px 12px;border-bottom:1px solid #2a2d3a;flex-shrink:0;}
.st-head-top{display:flex;align-items:center;}
.st-head-top h2{font-size:1rem;font-weight:800;color:#2a7fff;flex:1;}
.st-body{flex:1;overflow-y:auto;padding:12px 16px 10px;}
.st-foot{padding:10px 16px 14px;border-top:1px solid #2a2d3a;flex-shrink:0;}
/* calendar */
.st-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.st-cal-nav span{font-size:.9rem;font-weight:800;color:#e8eaf0;}
.st-cal-nav button{background:#2a2d3a;border:none;color:#e8eaf0;
  border-radius:8px;padding:5px 13px;cursor:pointer;font-size:.9rem;}
.st-cal-nav button:active{opacity:.7;}
.st-cal{width:100%;border-collapse:collapse;}
.st-cal th{color:#7a7f99;font-size:.72rem;text-align:center;padding:4px 0;font-weight:700;}
.st-cal td{text-align:center;padding:6px 2px;font-size:.82rem;cursor:pointer;border-radius:6px;position:relative;}
.st-cal td:hover:not(.st-empty-td){background:#2a2d3a;}
.st-cal td.st-today{color:#f1c40f;font-weight:800;}
.st-cal td.st-selected{background:#2a7fff!important;color:#fff;font-weight:800;}
.st-cal td.st-empty-td{cursor:default;}
.st-cal td.st-has-note::after{content:'';position:absolute;bottom:2px;left:50%;
  transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#2a7fff;}
.st-cal td.st-selected.st-has-note::after{background:#fff;}
/* note area */
.st-note-hdr{font-size:.78rem;font-weight:800;color:#2a7fff;margin:14px 0 6px;
  display:flex;align-items:center;justify-content:space-between;}
.st-note-hdr span{color:#7a7f99;font-weight:400;font-size:.73rem;}
.st-note-ta{width:100%;min-height:260px;padding:10px;
  background:#0f1117;border:1px solid #3a3d4a;border-radius:8px;
  color:#e8eaf0;font-size:.84rem;font-family:inherit;resize:vertical;outline:none;}
.st-note-ta:focus{border-color:#2a7fff;}
.st-note-ta::placeholder{color:#444;}
.st-save-btn{width:100%;padding:10px;border:none;border-radius:8px;
  background:#2a7fff;color:#fff;font-size:.88rem;font-weight:800;cursor:pointer;margin-top:8px;}
.st-save-btn:active{opacity:.75;}
.st-close-btn{width:100%;padding:9px;border:none;border-radius:8px;
  background:#2a2d3a;color:#aaa;font-size:.85rem;font-weight:700;cursor:pointer;}
.st-close-btn:active{opacity:.7;}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;
  justify-content:center;align-items:flex-end;}
.overlay.open{display:flex;}
.modal{background:#1a1d27;border-radius:18px 18px 0 0;
  width:100%;max-width:640px;max-height:82vh;overflow-y:auto;
  padding:16px 14px 40px;color:#e8eaf0;}
.mtop{display:flex;align-items:center;margin-bottom:10px;}
.mtop h2{font-size:1rem;font-weight:800;color:var(--accent);flex:1;}
.mcls{background:#2a2d3a;border:none;color:#e8eaf0;border-radius:50%;
  width:28px;height:28px;cursor:pointer;font-size:.9rem;}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:.73rem;color:#7a7f99;margin-bottom:8px;}
.legend span{display:flex;align-items:center;gap:3px;}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.stitle{font-size:.72rem;font-weight:800;letter-spacing:.1em;color:#7a7f99;
  padding:10px 0 4px;border-top:1px solid #2a2d3a;margin-top:2px;}
.stitle:first-child{border-top:none;margin-top:0;}
.srow2{display:flex;justify-content:space-between;align-items:center;
  padding:6px 2px;border-bottom:1px solid #2a2d3a;font-size:.84rem;}
.srow2:last-of-type{border-bottom:none;}
.sn2{flex:1;}
.sd{color:#7a7f99;font-size:.71rem;margin-right:4px;}
.sr{font-size:.92rem;font-weight:800;min-width:26px;text-align:right;}
.sr.pos{color:#ff8c00;}.sr.neg{color:#64b5f6;}
.cbtn{display:block;width:100%;margin-top:14px;padding:12px;
  background:#2a2d3a;color:#e8eaf0;border:none;
  border-radius:10px;font-size:.86rem;font-weight:700;cursor:pointer;}
.cbtn:active{opacity:.7;}
.empty{color:#7a7f99;font-size:.82rem;padding:12px 0;}
</style>
</head>
<body>

<div class="topbar">
  <span style="font-size:1.4rem">🎾</span>
  <h1>Assenze e Recuperi Tennis</h1>
  <button class="fab" onclick="openModal()">📋 Riepilogo</button>
  <button class="fab" style="background:#2a7fff;" onclick="openStorico()">📅 Storico</button>
</div>

<div class="scroll">
  <table id="tbl">
    <colgroup>
      <col class="time-col">
      <col class="day-col"><col class="day-col"><col class="day-col">
      <col class="day-col"><col class="day-col">
    </colgroup>
    <thead>
      <tr>
        <th class="time-th">ore</th>
        <th>LUN</th><th>MAR</th><th>MER</th><th>GIO</th><th>VEN</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="notes-section">
  <h2>📝 NOTE</h2>
  <textarea class="notes-area" id="notesArea" placeholder="Scrivi qui le tue note..."></textarea>
</div>

<div class="ag-overlay" id="agOverlay">
  <div class="ag-modal">
    <h3 id="agTitle">Nuovo gruppo</h3>
    <label>Tipo gruppo</label>
    <select id="agType">
      <option value="Adulti">Adulti</option>
      <option value="Ragazzi">Ragazzi</option>
    </select>
    <label>Colore</label>
    <select id="agColor">
      <option value="s-yellow">Giallo (Adulti)</option>
      <option value="s-pink">Rosa</option>
      <option value="s-orange">Arancione</option>
      <option value="s-cyan">Azzurro</option>
      <option value="s-green">Verde</option>
      <option value="s-gray">Grigio</option>
    </select>
    <div class="ag-btns">
      <button class="ag-btn cancel" onclick="closeAddGroup()">Annulla</button>
      <button class="ag-btn confirm" onclick="confirmAddGroup()">Crea gruppo</button>
    </div>
  </div>
</div>

<div class="st-overlay" id="stOverlay" onclick="stBgClose(event)">
  <div class="st-modal">
    <div class="st-head">
      <div class="st-head-top">
        <h2>📅 Storico</h2>
        <button class="mcls" onclick="closeStorico()">✕</button>
      </div>
    </div>
    <div class="st-body">
      <!-- calendar nav -->
      <div class="st-cal-nav">
        <button onclick="stPrevMonth()">◀</button>
        <span id="stCalTitle"></span>
        <button onclick="stNextMonth()">▶</button>
      </div>
      <table class="st-cal">
        <thead><tr>
          <th>Lun</th><th>Mar</th><th>Mer</th><th>Gio</th><th>Ven</th><th>Sab</th><th>Dom</th>
        </tr></thead>
        <tbody id="stCalBody"></tbody>
      </table>
      <!-- note area (shown after selecting a date) -->
      <div id="stNoteArea" style="display:none">
        <div class="st-note-hdr">
          <span id="stNoteTitle">Note del giorno</span>
          <span id="stNoteSaved" style="color:#2a7fff;display:none">✓ Salvato</span>
        </div>
        <textarea class="st-note-ta" id="stNoteText"
          placeholder="Scrivi qui gli assenti ed i recuperi di questa giornata..."></textarea>
        <button class="st-save-btn" onclick="stSaveNote()">💾 Salva nota</button>
      </div>
    </div>
    <div class="st-foot">
      <button class="st-close-btn" onclick="closeStorico()">Chiudi</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="mtop">
      <h2>📋 Riepilogo</h2>
      <button class="mcls" onclick="closeModal()">✕</button>
    </div>
    <div class="legend">
      <span><span class="ldot" style="background:#ff8c00"></span>Da recuperare (+)</span>
      <span><span class="ldot" style="background:#64b5f6"></span>Recupero anticipato (−)</span>
    </div>
    <div id="mc"></div>
    <button class="cbtn" onclick="copyText()">📋 Copia testo per WhatsApp</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
// Slots organised by time-band, then by day
// Each slot: { id, lbl, col, st[] }  — time is implicit from the row

var TIMES = ["16:00","17:00","18:00","19:00","20:00"];

// For each time band, what slot exists per day (null = empty)
var GRID = {
  "16:00": {
    LUN: null, MAR: null, MER: null, GIO: null, VEN: null,
  },
  "17:00": {
    LUN: {id:"C_L",  lbl:"Ragazzi", col:"s-pink",
          st:["Morbioli Alice","Pangallo M.Grazia","Dal Brun Desideria","Cangialosi Eleonora"]},
    MAR: {id:"17M",  lbl:"Ragazzi", col:"s-cyan",
          st:["Agordi Andrea","Durastante Nicola","Conforti Riccardo","Grussani Emanuele","Stefenelli Tommaso"]},
    MER: {id:"17W",  lbl:"Ragazzi", col:"s-gray",
          st:["Rovetti Thomas","De Rosa Gaia","Tirapelle Letizia","Morbioli Alice"]},
    GIO: {id:"17T",  lbl:"Ragazzi", col:"s-cyan",
          st:["Agordi Andrea","Durastante Nicola","Conforti Riccardo","Grussani Emanuele","Stefenelli Tommaso"]},
    VEN: {id:"17V",  lbl:"Ragazzi", col:"s-gray",
          st:["Rovetti Thomas","De Rosa Gaia","Tirapelle Letizia","Ellero Iris"]},
  },
  "18:00": {
    LUN: {id:"D_L",  lbl:"Ragazzi", col:"s-orange",
          st:["Porcaro Giorgia","Marchesini Noemi","Marchesini Alissa","Asnicar Eva"]},
    MAR: {id:"18M",  lbl:"Ragazzi", col:"s-green",
          st:["Rampazzo Jacopo","Di Martino Tommaso","Ingrassia Riccardo","Tasson Simone"]},
    MER: {id:"18W",  lbl:"Adulti",  col:"s-yellow",
          st:["Dal Lago Emilio","Marchetto Marco","Riva William","Zerbato Giulio"]},
    GIO: {id:"18T",  lbl:"Ragazzi", col:"s-green",
          st:["Rampazzo Jacopo","Di Martino Tommaso","Ingrassia Riccardo","Tasson Simone"]},
    VEN: {id:"D_V",  lbl:"Ragazzi", col:"s-orange",
          st:["Porcaro Giorgia","Marchesini Noemi","Marchesini Alissa","Rossella Dal Bon"]},
  },
  "19:00": {
    LUN: {id:"19L",  lbl:"Adulti",  col:"s-yellow",
          st:["De Pretto Paolo","Sartori Franco","Cucinella Stefano","Menegazzoli Luca"]},
    MAR: {id:"19M",  lbl:"Adulti",  col:"s-yellow",
          st:["Rinaldin Luca","Giuseppe Rossetto","Genovesi Alessandro","Alessandro Lotto"]},
    MER: {id:"19W",  lbl:"Adulti",  col:"s-yellow",
          st:["Festugato Matteo","De Rosa Luca","Zorzan Elisa","Clarissa Scalchi"]},
    GIO: {id:"19T",  lbl:"Adulti",  col:"s-yellow",
          st:["Castegnaro Milena","Marchetto Silvia","Negro Silvia","Ilic Sandra"]},
    VEN: null,
  },
  "20:00": {
    LUN: {id:"20L",  lbl:"Adulti",  col:"s-yellow",
          st:["Magnaguagno Alice","Castegnaro Sofia","Marangoni Martina","Bertini Sara"]},
    MAR: {id:"20M",  lbl:"Adulti",  col:"s-yellow",
          st:["Manuel Marini","Bertinato Beatrice","Fina Alice","Totti Martina"]},
    MER: {id:"20W",  lbl:"Adulti",  col:"s-yellow",
          st:["Finetti Diego","Petrella Flavio","Peotta Alessandro","Nardi Loris"]},
    GIO: {id:"20T",  lbl:"Adulti",  col:"s-yellow",
          st:["Menti Matteo","Remelli Marco","Durastante Paolo","Loveraj Singh"]},
    VEN: null,  // venerdì niente alle 20
  },
};

var DAYS = ["LUN","MAR","MER","GIO","VEN"];
var DLBL = {LUN:"Lunedì",MAR:"Martedì",MER:"Mercoledì",GIO:"Giovedì",VEN:"Venerdì"};

// ── STATE ─────────────────────────────────────────────────────────────────────
var S = {};
function initState(){
  var saved = null;
  try { saved = localStorage.getItem('tennis_recuperi'); } catch(e){}
  if(saved){
    S = JSON.parse(saved);
    // assicura che nuovi allievi aggiunti in futuro abbiano sempre un entry
    TIMES.forEach(function(t){
      DAYS.forEach(function(d){
        var slot = GRID[t][d];
        if(!slot) return;
        if(!S[slot.id]) S[slot.id] = {};
        slot.st.forEach(function(n){
          if(!S[slot.id][n]) S[slot.id][n] = {rec:0,absent:false};
        });
      });
    });
    return;
  }
  TIMES.forEach(function(t){
    DAYS.forEach(function(d){
      var slot = GRID[t][d];
      if(!slot) return;
      if(!S[slot.id]) S[slot.id] = {};
      slot.st.forEach(function(n){ S[slot.id][n] = {rec:0,absent:false}; });
    });
  });
}

function saveState(){
  try { localStorage.setItem('tennis_recuperi', JSON.stringify(S)); } catch(e){}
}

// ── BUILD TABLE ───────────────────────────────────────────────────────────────
function build(){
  var tbody = document.getElementById('tbody');

  TIMES.forEach(function(time){
    var tr = document.createElement('tr');

    // time cell
    var tc = document.createElement('td');
    tc.className = 'time-cell';
    tc.textContent = time;
    tr.appendChild(tc);

    DAYS.forEach(function(day){
      var slot = GRID[time][day];
      var td = document.createElement('td');

      if(!slot){
        td.className = 'empty-cell';
        var addGrpBtn = document.createElement('button');
        addGrpBtn.className = 'add-grp-btn';
        addGrpBtn.textContent = '+';
        addGrpBtn.title = 'Aggiungi gruppo';
        (function(d,t){ addGrpBtn.onclick = function(){ openAddGroup(d,t); }; })(day,time);
        td.appendChild(addGrpBtn);
      } else {
        td.className = 'slot-cell';
        var inner = document.createElement('div');
        inner.className = 'slot-inner ' + slot.col;

        // slot header
        var hdr = document.createElement('div');
        hdr.className = 'slot-hdr';
        hdr.innerHTML = '<span class="lbl">'+slot.lbl+'</span>'
          +'<button class="edit-btn" onclick="toggleEdit(\''+slot.id+'\')" title="Modifica allievi">✏️</button>';
        inner.appendChild(hdr);

        // student list
        var slist = document.createElement('div');
        slist.className = 'slist';
        slist.id = 'sl-' + slot.id;
        slot.st.forEach(function(name){
          slist.appendChild(mkRow(slot.id, name));
        });
        inner.appendChild(slist);
        td.appendChild(inner);
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

function mkRow(sid, name){
  var row = document.createElement('div');
  row.id = 'r-' + sid + '-' + name.replace(/\s+/g,'_');
  redrawRow(row, sid, name);
  return row;
}

function redrawRow(row, sid, name){
  var s = S[sid][name];
  row.className = 'srow' + (s.absent ? ' absent' : '');
  var r = s.rec;
  var cls = r===0?'z':r>0?'pos':'neg';
  var txt = r===0?'·':r>0?'+'+r:''+r;
  var editing = !!editingSlots[sid];
  var e = function(n){return n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");};

  // find if this slot is Adulti or Ragazzi
  var isAdulti = false;
  TIMES.forEach(function(t){ DAYS.forEach(function(d){
    var sl=GRID[t][d];
    if(sl&&sl.id===sid&&sl.lbl==='Adulti') isAdulti=true;
  }); });

  var delBtn = document.createElement('button');
  delBtn.className = 'del-btn';
  delBtn.textContent = '✕';
  delBtn.style.display = editing ? 'flex' : 'none';
  delBtn.onclick = function(){ delStudent(sid, name); };

  var absBtn = document.createElement('button');
  absBtn.className = 'abtn';
  absBtn.textContent = '✗';
  absBtn.style.display = editing ? 'none' : 'flex';
  absBtn.onclick = function(){ togAbs(sid, name); };

  var nameSpan = document.createElement('span');
  nameSpan.className = 'sname';
  nameSpan.textContent = name;

  if(editing){
    nameSpan.style.cursor = 'pointer';
    nameSpan.title = 'Clicca per modificare il nome';
    nameSpan.onclick = function(){ stStartRename(sid, name, nameSpan); };
  }

  row.innerHTML = '';
  row.appendChild(delBtn);
  row.appendChild(absBtn);
  row.appendChild(nameSpan);

  var rctl = document.createElement('div');
  rctl.className = 'rctl';
  rctl.style.display = editing ? 'none' : 'flex';
  rctl.innerHTML =
    '<button class="rbtn m" onclick="chgRec(\''+sid+'\',\''+e(name)+'\',-1)">−</button>'
    +'<span class="rcnt '+cls+'">'+txt+'</span>'
    +'<button class="rbtn p" onclick="chgRec(\''+sid+'\',\''+e(name)+'\',1)">+</button>';
  row.appendChild(rctl);
}

function refresh(sid, name){
  var row = document.getElementById('r-'+sid+'-'+name.replace(/\s+/g,'_'));
  if(row) redrawRow(row, sid, name);
}

// ── EDIT MODE ─────────────────────────────────────────────────────────────────
var editingSlots = {};

function toggleEdit(sid){
  editingSlots[sid] = !editingSlots[sid];
  var list = document.getElementById('sl-'+sid);

  // find the slot and redraw all rows
  TIMES.forEach(function(t){ DAYS.forEach(function(d){
    var sl = GRID[t][d];
    if(sl && sl.id===sid){
      sl.st.forEach(function(name){ refresh(sid, name); });
    }
  }); });

  if(editingSlots[sid]){
    if(!document.getElementById('add-row-'+sid)){
      var ar = document.createElement('div');
      ar.className = 'add-row';
      ar.id = 'add-row-'+sid;
      ar.innerHTML =
        '<input class="add-input" id="add-input-'+sid+'" placeholder="Nome cognome" '
        +'onkeydown="if(event.key===\'Enter\')addStudent(\''+sid+'\')">'
        +'<button class="add-confirm" onclick="addStudent(\''+sid+'\')">✓</button>';
      list.appendChild(ar);
    }
  } else {
    var ar = document.getElementById('add-row-'+sid);
    if(ar) ar.remove();
  }
}

function addStudent(sid){
  var inp = document.getElementById('add-input-'+sid);
  var name = inp.value.trim();
  if(!name) return;
  // find which slot this id belongs to and add to GRID
  var found = false;
  TIMES.forEach(function(t){ DAYS.forEach(function(d){
    var sl = GRID[t][d];
    if(sl && sl.id===sid && !found){
      if(sl.st.indexOf(name)===-1){ sl.st.push(name); found=true; }
    }
  }); });
  if(!found) return;
  if(!S[sid][name]) S[sid][name]={rec:0,absent:false};
  var list = document.getElementById('sl-'+sid);
  var ar = document.getElementById('add-row-'+sid);
  list.insertBefore(mkRow(sid, name), ar);
  inp.value='';
  saveState();
  saveRoster();
}

function delStudent(sid, name){
  // remove from GRID
  TIMES.forEach(function(t){ DAYS.forEach(function(d){
    var sl=GRID[t][d];
    if(sl&&sl.id===sid){
      var i=sl.st.indexOf(name);
      if(i>-1) sl.st.splice(i,1);
    }
  }); });
  delete S[sid][name];
  var row = document.getElementById('r-'+sid+'-'+name.replace(/\s+/g,'_'));
  if(row) row.remove();
  saveState();
  saveRoster();

  // if slot is now empty, remove the whole slot and restore the + button
  var remaining = Object.keys(S[sid]||{}).length;
  if(remaining === 0){
    removeSlot(sid);
  }
}

function removeSlot(sid){
  // find day and time for this slot
  var foundDay=null, foundTime=null;
  TIMES.forEach(function(t){ DAYS.forEach(function(d){
    var sl=GRID[t][d];
    if(sl&&sl.id===sid){ foundDay=d; foundTime=t; }
  }); });
  if(!foundDay) return;

  // remove from GRID and state
  GRID[foundTime][foundDay] = null;
  delete S[sid];

  // rebuild cell as empty with + button
  var tbody = document.getElementById('tbody');
  var dayIdx = DAYS.indexOf(foundDay) + 1;
  var timeIdx = TIMES.indexOf(foundTime);
  var row = tbody.rows[timeIdx];
  var td = row.cells[dayIdx];

  td.className = 'empty-cell';
  td.innerHTML = '';
  var addGrpBtn = document.createElement('button');
  addGrpBtn.className = 'add-grp-btn';
  addGrpBtn.textContent = '+';
  addGrpBtn.title = 'Aggiungi gruppo';
  (function(d,t){ addGrpBtn.onclick = function(){ openAddGroup(d,t); }; })(foundDay, foundTime);
  td.appendChild(addGrpBtn);

  saveRoster();
}

// persist custom roster changes
function saveRoster(){
  var roster={};
  TIMES.forEach(function(t){ DAYS.forEach(function(d){
    var sl=GRID[t][d];
    if(sl){
      roster[sl.id]=sl.st.slice();
      // save metadata for custom groups
      if(sl.id.indexOf('custom_')===0){
        roster['__meta_'+sl.id]={lbl:sl.lbl,col:sl.col};
      }
    }
  }); });
  try{ localStorage.setItem('tennis_roster', JSON.stringify(roster)); }catch(e){}
}

function loadRoster(){
  try{
    var saved=localStorage.getItem('tennis_roster');
    if(!saved) return;
    var roster=JSON.parse(saved);
    // restore existing slot student lists
    TIMES.forEach(function(t){ DAYS.forEach(function(d){
      var sl=GRID[t][d];
      if(sl&&roster[sl.id]) sl.st=roster[sl.id];
    }); });
    // restore custom groups that were added by the user
    Object.keys(roster).forEach(function(sid){
      if(sid.indexOf('custom_')!==0) return;
      // parse day and time from id: custom_LUN_1900
      var parts = sid.split('_'); // ['custom','LUN','1900']
      if(parts.length<3) return;
      var day=parts[1];
      var timeRaw=parts[2]; // '1900'
      var time=timeRaw.substring(0,2)+':'+timeRaw.substring(2); // '19:00'
      if(!GRID[time]||GRID[time][day]) return; // already exists
      var meta = roster['__meta_'+sid];
      if(!meta) return;
      GRID[time][day] = {id:sid, lbl:meta.lbl, col:meta.col, st:roster[sid]};
    });
  }catch(e){}
}

var _agDay = null, _agTime = null;

function openAddGroup(day, time){
  _agDay = day; _agTime = time;

  document.getElementById('agOverlay').classList.add('open');
}

function closeAddGroup(){
  document.getElementById('agOverlay').classList.remove('open');
}

function confirmAddGroup(){
  var day = _agDay, time = _agTime;
  var lbl = document.getElementById('agType').value;
  var col = document.getElementById('agColor').value;

  // generate unique id
  var sid = 'custom_'+day+'_'+time.replace(':','');

  // add to GRID
  GRID[time][day] = {id:sid, lbl:lbl, col:col, st:[]};

  // init state
  S[sid] = {};

  var tbody = document.getElementById('tbody');

    +'<button class="edit-btn" onclick="toggleEdit(\''+sid+'\')" title="Modifica allievi">✏️</button>';

function stStartRename(sid, oldName, nameSpan){
  var input = document.createElement('input');
  input.value = oldName;
  input.className = 'add-input';
  input.style.flex = '1';
  nameSpan.replaceWith(input);
  input.focus();
  input.select();

  function doRename(){
    var newName = input.value.trim();
    if(!newName || newName === oldName){
      refresh(sid, oldName); return;
    }
    // update GRID
    TIMES.forEach(function(t){ DAYS.forEach(function(d){
      var sl=GRID[t][d];
      if(sl&&sl.id===sid){
        var i=sl.st.indexOf(oldName);
        if(i>-1) sl.st[i]=newName;
      }
    }); });
    // update state
    S[sid][newName] = S[sid][oldName];
    delete S[sid][oldName];
    // update DOM row id
    var row = input.closest ? input.closest('.srow') : null;
    if(row) row.id = 'r-'+sid+'-'+newName.replace(/\s+/g,'_');
    refresh(sid, newName);
    saveState();
    saveRoster();
  }

  input.onblur = doRename;
  input.onkeydown = function(e){
    if(e.key==='Enter'){ input.blur(); }
    if(e.key==='Escape'){ input.value=oldName; input.blur(); }
  };
}

function initNotes(){
  var area = document.getElementById('notesArea');
  try{ area.value = localStorage.getItem('tennis_notes')||''; }catch(e){}
  area.addEventListener('input', function(){
    try{ localStorage.setItem('tennis_notes', area.value); }catch(e){}
  });
}


function togAbs(sid, name){
  S[sid][name].absent = !S[sid][name].absent;
  refresh(sid, name);
  saveState();
}
function chgRec(sid, name, delta){
  S[sid][name].rec += delta;
  refresh(sid, name);
  saveState();
}

// helper: find day+time for a slot id
function slotMeta(sid){
  var res = {day:null,time:null,lbl:null};
  TIMES.forEach(function(t){
    DAYS.forEach(function(d){
      var sl=GRID[t][d];
      if(sl&&sl.id===sid){res.day=d;res.time=t;res.lbl=sl.lbl;}
    });
  });
  return res;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(){
  var c = document.getElementById('mc');
  c.innerHTML='';
  var any=false;

  // indisponibili – raggruppa per persona
  var indMap = {};
  DAYS.forEach(function(day){
    TIMES.forEach(function(t){
      var sl=GRID[t][day];
      if(!sl) return;
      sl.st.forEach(function(name){
        if(S[sl.id][name].absent){
          if(!indMap[name]) indMap[name]=[];
          indMap[name].push(DLBL[day]+' '+t);
        }
      });
    });
  });

  var indEntries = Object.keys(indMap);
  if(indEntries.length){
    any=true;
    addTitle(c,'✗ INDISPONIBILI');
    indEntries.forEach(function(name){
      addRow(c, name,
        '<small style="color:#7a7f99;font-size:.7rem">'+indMap[name].join(', ')+'</small>',
        '');
    });
  }

  // recuperi
  var rm={};
  TIMES.forEach(function(t){
    DAYS.forEach(function(d){
      var sl=GRID[t][d];
      if(!sl) return;
      sl.st.forEach(function(name){
        var r=S[sl.id][name].rec;
        if(r===0) return;
        if(!rm[name]) rm[name]={total:0,slots:[]};
        rm[name].total+=r;
        rm[name].slots.push(DLBL[d]+' '+t);
      });
    });
  });

  var pos=[],neg=[];
  Object.keys(rm).forEach(function(n){
    if(rm[n].total>0) pos.push([n,rm[n]]);
    else neg.push([n,rm[n]]);
  });
  pos.sort(function(a,b){return b[1].total-a[1].total;});
  neg.sort(function(a,b){return a[1].total-b[1].total;});

  if(pos.length){
    any=true;
    addTitle(c,'↩ DA RECUPERARE');
    pos.forEach(function(e){
      addRow(c,e[0],'<small style="color:#7a7f99;font-size:.7rem">'+e[1].slots.join(', ')+'</small>',
        '<span class="sr pos">+'+e[1].total+'</span>');
    });
  }
  if(neg.length){
    any=true;
    addTitle(c,'⏩ RECUPERO ANTICIPATO');
    neg.forEach(function(e){
      addRow(c,e[0],'<small style="color:#7a7f99;font-size:.7rem">'+e[1].slots.join(', ')+'</small>',
        '<span class="sr neg">'+e[1].total+'</span>');
    });
  }

  if(!any) c.innerHTML='<p class="empty">Nessuna assenza o recupero registrati.</p>';
  document.getElementById('overlay').classList.add('open');
}

function copyText(){
  var t='🎾 TENNIS – RIEPILOGO\n'+new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'})+'\n';
  var indMap={};
  DAYS.forEach(function(day){
    TIMES.forEach(function(time){
      var sl=GRID[time][day];if(!sl)return;
      sl.st.forEach(function(name){
        if(S[sl.id][name].absent){
          if(!indMap[name]) indMap[name]=[];
          indMap[name].push(DLBL[day]+' '+time);
        }
      });
    });
  });
  var indEntries=Object.keys(indMap);
  if(indEntries.length){
    t+='\nINDISPONIBILI:\n';
    indEntries.forEach(function(name){t+='  • '+name+' ('+indMap[name].join(', ')+')\n';});
  }
  var rm={};
  TIMES.forEach(function(time){DAYS.forEach(function(day){
    var sl=GRID[time][day];if(!sl)return;
    sl.st.forEach(function(name){var r=S[sl.id][name].rec;if(r!==0){rm[name]=(rm[name]||0)+r;}});
  });});
  var pos=[],neg=[];
  Object.keys(rm).forEach(function(n){if(rm[n]>0)pos.push([n,rm[n]]);else neg.push([n,rm[n]]);});
  pos.sort(function(a,b){return b[1]-a[1];});neg.sort(function(a,b){return a[1]-b[1];});
  if(pos.length){t+='\n\nDA RECUPERARE:\n';pos.forEach(function(e){t+='  • '+e[0]+': +'+e[1]+'\n';});}
  if(neg.length){t+='\nRECUPERO ANTICIPATO:\n';neg.forEach(function(e){t+='  • '+e[0]+': '+e[1]+'\n';});}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(function(){alert('✅ Testo copiato!');});
  } else {
    var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');alert('✅ Testo copiato!');}catch(err){alert('Copia:\n\n'+t);}
    document.body.removeChild(ta);
  }
}

function openStorico(){
  var today = new Date();
  stCalYear = today.getFullYear();
  stCalMonth = today.getMonth();
  stSelectedDate = null;
  document.getElementById('stNoteArea').style.display = 'none';
  renderCalendar();
  document.getElementById('stOverlay').classList.add('open');
}
function closeStorico(){ document.getElementById('stOverlay').classList.remove('open'); }
function stBgClose(e){ if(e.target===document.getElementById('stOverlay')) closeStorico(); }

function stPrevMonth(){ stCalMonth--; if(stCalMonth<0){stCalMonth=11;stCalYear--;} renderCalendar(); }
function stNextMonth(){ stCalMonth++; if(stCalMonth>11){stCalMonth=0;stCalYear++;} renderCalendar(); }

var MONTH_NAMES = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
  'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

function renderCalendar(){
  document.getElementById('stCalTitle').textContent = MONTH_NAMES[stCalMonth] + ' ' + stCalYear;
  var tbody = document.getElementById('stCalBody');
  tbody.innerHTML = '';

  var today = new Date();
  var todayStr = today.getFullYear()+'-'+pad(today.getMonth()+1)+'-'+pad(today.getDate());

  // first day of month (0=sun..6=sat), convert to mon-based (0=mon..6=sun)
  var firstDay = new Date(stCalYear, stCalMonth, 1).getDay();
  firstDay = (firstDay + 6) % 7; // monday-based
  var daysInMonth = new Date(stCalYear, stCalMonth+1, 0).getDate();

  var day = 1;
  for(var row=0; row<6; row++){
    var tr = document.createElement('tr');
    for(var col=0; col<7; col++){
      var td = document.createElement('td');
      var cellIdx = row*7+col;
      if(cellIdx < firstDay || day > daysInMonth){
        td.className = 'st-empty-td';
      } else {
        var dateStr = stCalYear+'-'+pad(stCalMonth+1)+'-'+pad(day);
        td.textContent = day;
        var cls = [];
        if(dateStr === todayStr) cls.push('st-today');
        if(dateStr === stSelectedDate) cls.push('st-selected');
        if(stNotes[dateStr]) cls.push('st-has-note');
        td.className = cls.join(' ');
        (function(ds){ td.onclick = function(){ stSelectDate(ds); }; })(dateStr);
        day++;
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
    if(day > daysInMonth) break;
  }
}

function pad(n){ return String(n).padStart(2,'0'); }

function stSelectDate(dateStr){
  stSelectedDate = dateStr;
  renderCalendar();
  // show note area
  var dp = dateStr.split('-');
  var d = new Date(dateStr+'T00:00:00');
  var DNAMES = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  var label = dp[2]+'/'+dp[1]+'/'+dp[0]+' – '+DNAMES[d.getDay()];
  document.getElementById('stNoteTitle').textContent = label;
  document.getElementById('stNoteText').value = stNotes[dateStr] || '';
  document.getElementById('stNoteSaved').style.display = 'none';
  document.getElementById('stNoteArea').style.display = 'block';
}

function stSaveNote(){
  if(!stSelectedDate) return;
  var txt = document.getElementById('stNoteText').value;
  if(txt.trim()){
    stNotes[stSelectedDate] = txt;
  } else {
    delete stNotes[stSelectedDate];
  }
  saveStorico();
  renderCalendar();
  var saved = document.getElementById('stNoteSaved');
  saved.style.display = 'inline';
  setTimeout(function(){ saved.style.display='none'; }, 1500);
}

loadRoster();
initState();
build();
initNotes();
loadStorico();
